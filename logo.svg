<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Glow and drop shadow for visibility on dark/light backgrounds -->
    <filter id="glow-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="1.0" flood-color="#000000" flood-opacity="0.85"/>
    </filter>
    <!-- Crimson to dark red gradient for body lines -->
    <linearGradient id="crimson-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2E55" />
      <stop offset="100%" stop-color="#AA0B27" />
    </linearGradient>
  </defs>
  
  <g filter="url(#glow-shadow)">
    <!-- WINGS & BODY (Off-white/Silver lines with low-opacity fill) -->
    <g stroke="#F0EEE9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Upper Wing Folds -->
      <polygon points="44,38 35,20 45,27" fill="rgba(240, 238, 233, 0.04)" />
      <polygon points="35,20 41,30 45,27" fill="rgba(240, 238, 233, 0.04)" />
      <polygon points="37,28 42,35 44,38" fill="rgba(240, 238, 233, 0.04)" />
      <polygon points="37,28 41,30 42,35" fill="rgba(240, 238, 233, 0.04)" />
      <line x1="41" y1="30" x2="44" y2="38" />
      <line x1="35" y1="20" x2="48" y2="33" />
      
      <!-- Under Wing (in background) -->
      <polygon points="37,22 45,27 41,20" fill="rgba(240, 238, 233, 0.02)" opacity="0.7" />
      
      <!-- Lower Body & Tail -->
      <polygon points="44,38 48,45 50,52" fill="rgba(240, 238, 233, 0.04)" />
      <polygon points="44,38 50,52 40,58" fill="rgba(240, 238, 233, 0.04)" />
      <polygon points="40,58 46,55 50,52" fill="rgba(240, 238, 233, 0.04)" />
      <line x1="44" y1="38" x2="40" y2="58" />
      <line x1="46" y1="55" x2="44" y2="38" />
      
      <!-- Floating Particles behind tail -->
      <polygon points="32,40 35,42 33,45" fill="none" stroke-width="1.2" />
      <polygon points="30,46 34,46 32,48" fill="none" stroke-width="1.2" />
      <polygon points="35,50 38,52 36,54" fill="none" stroke-width="1.2" />
      <polygon points="38,48 40,50 39,52" fill="none" stroke-width="1.2" />
      <polygon points="34,44 38,44 36,46" fill="none" stroke-width="1.2" />
    </g>
    
    <!-- HEAD & CHEST (Crimson/Accent lines with low-opacity fill) -->
    <g stroke="url(#crimson-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Beak -->
      <polygon points="62,32 80,33 63,35" fill="rgba(204, 16, 51, 0.08)" />
      <line x1="62" y1="32" x2="63" y2="35" />
      
      <!-- Head Folds -->
      <polygon points="62,32 57,30 59,34" fill="rgba(204, 16, 51, 0.08)" />
      <polygon points="62,32 59,34 63,35" fill="rgba(204, 16, 51, 0.08)" />
      <polygon points="57,30 54,33 59,34" fill="rgba(204, 16, 51, 0.06)" />
      
      <!-- Throat & Neck -->
      <polygon points="63,35 59,34 58,38" fill="rgba(204, 16, 51, 0.08)" />
      <polygon points="59,34 54,33 52,36" fill="rgba(204, 16, 51, 0.06)" />
      <polygon points="54,33 49,35 52,36" fill="rgba(204, 16, 51, 0.06)" />
      <line x1="59" y1="34" x2="52" y2="36" />
      <line x1="58" y1="38" x2="52" y2="36" />
      
      <!-- Chest & Front Belly -->
      <polygon points="63,35 58,38 62,45" fill="rgba(204, 16, 51, 0.08)" />
      <polygon points="58,38 52,36 50,42" fill="rgba(204, 16, 51, 0.06)" />
      <polygon points="58,38 50,42 56,45" fill="rgba(204, 16, 51, 0.06)" />
      <polygon points="62,45 56,45 58,38" fill="rgba(204, 16, 51, 0.08)" />
      <polygon points="62,45 56,45 50,52" fill="rgba(204, 16, 51, 0.08)" />
      <line x1="56" y1="45" x2="50" y2="52" />
    </g>
  </g>
</svg>
